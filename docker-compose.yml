version: '3.8'

services:
  app:
    build: .
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "8081:8081"   # Metro Bundler
      - "19000:19000" # Expo CLI
      - "19001:19001" # Expo CLI
      - "19002:19002" # Expo CLI
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=127.0.0.1 # Change this to your local IP if running on a real device
    stdin_open: true
    tty: true
    command: npm start

  emulators:
    build: .
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "9099:9099" # Auth
      - "8080:8080" # Firestore
      - "4000:4000" # Emulator UI
    command: npm run emulators

  functions:
    build: .
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5001:5001" # Functions
    command: npm run worker
